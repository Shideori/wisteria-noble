<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Wisteria Noble - Fantasy Outfit Builder">
  <title>Fantasy Outfit Builder | Wisteria Noble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css?v=20260716-spa-fixed">
</head>
<body>
  <div class="background-decoration background-decoration--one" aria-hidden="true"></div>
  <div class="background-decoration background-decoration--two" aria-hidden="true"></div>

  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="#home" aria-label="ホームへ戻る">
        <span class="brand__crest" aria-hidden="true">WN</span>
        <span class="brand__text">
          <span class="brand__project">Wisteria Noble</span>
          <span class="brand__title">Fantasy Outfit Builder</span>
        </span>
      </a>

      <button
        class="selected-prompt-button"
        id="openPromptPanelButton"
        type="button"
        aria-controls="promptPanel"
        aria-expanded="false"
      >
        <span>選択中のプロンプト</span>
        <span class="selected-prompt-button__count" id="selectedPromptCount">0</span>
      </button>
    </div>
  </header>

  <main class="main-content">
    <section id="appView" class="app-view" aria-live="polite"></section>
  </main>

  <aside class="prompt-panel" id="promptPanel" aria-hidden="true">
    <div class="prompt-panel__backdrop" id="promptPanelBackdrop"></div>
    <section class="prompt-panel__dialog" role="dialog" aria-modal="true" aria-labelledby="promptPanelTitle">
      <div class="prompt-panel__header">
        <div>
          <p class="prompt-panel__eyebrow">Prompt Composer</p>
          <h2 class="prompt-panel__title" id="promptPanelTitle">選択中のプロンプト</h2>
        </div>
        <button class="icon-button" id="closePromptPanelButton" type="button" aria-label="閉じる">×</button>
      </div>

      <div class="prompt-panel__content">
        <div class="empty-state" id="emptyPromptState">
          <span class="empty-state__icon" aria-hidden="true">✦</span>
          <p>まだプロンプトが選択されていません。</p>
          <span>各カテゴリの「追加」ボタンから組み合わせてください。</span>
        </div>

        <div class="selected-list" id="selectedPromptList"></div>

        <label class="prompt-output-label" for="promptOutput">統合プロンプト</label>
        <textarea class="prompt-output" id="promptOutput" rows="8" readonly></textarea>
      </div>

      <div class="prompt-panel__footer">
        <button class="secondary-button" id="clearPromptButton" type="button">すべて解除</button>
        <button class="primary-button" id="copyAllPromptButton" type="button">まとめてコピー</button>
      </div>
    </section>
  </aside>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <footer class="site-footer">
    <p>Wisteria Noble — Fantasy Outfit Builder<br><small>SPA Navigation Fix 2026.07.16</small></p>
  </footer>

  <script src="./script.js?v=20260716-spa-fixed" defer></script>
</body>
</html>
